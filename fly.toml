# fly.toml — Fly.io deployment config
app = "ai-bot-voiceteam"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[services]]
  protocol = "udp"
  internal_port = 5060
  ports = ["5060"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50