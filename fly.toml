# fly.toml app configuration file generated for ai-bot-voiceteam-ihofsg on 2026-07-15T08:59:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-bot-voiceteam-ihofsg'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 20

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
