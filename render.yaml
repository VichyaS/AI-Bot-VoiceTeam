# Render Blueprint — deploy ac-bot-api + admin dashboard
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ac-bot-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm ci && npm run build:all
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8081
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: superadmin
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_ROLE
        value: SUPER_ADMIN
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
